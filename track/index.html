<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Track Your Shipment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./track.css">
</head>
<body>
  <main class="track-page">
    <section class="track-shell" data-track-widget data-api-base="" data-pod-route-template="">
      <div class="track-hero">
        <div class="track-hero-copy">
          <a href="/" class="track-home" data-track-home-link>
            <span aria-hidden="true">←</span>
            <span>Back to Home</span>
          </a>
          <p class="track-eyebrow">Live shipment tracking</p>
          <h1 class="track-title">Track your consignment</h1>
          <p class="track-subtitle">Enter your consignment number to view a clean, courier-style delivery summary with pickup, destination, ETA and POD details.</p>
        </div>

        <form class="track-form" autocomplete="off" aria-label="Track shipment form" data-track-form>
          <label class="track-input-label" for="consignment_number">Consignment Number</label>
          <div class="track-search-row">
            <input id="consignment_number" type="text" name="consignment_number" placeholder="Enter Consignment Number" class="track-input" required maxlength="16" pattern="[A-Za-z0-9]{1,16}">
            <button type="submit" class="track-btn"><span aria-hidden="true">⌕</span><span>Track</span></button>
          </div>
        </form>

        <div class="track-alert" role="alert" hidden data-track-alert></div>
      </div>

      <div class="track-result" aria-live="polite" hidden data-track-result></div>
    </section>
  </main>

  <script src="./track.js"></script>
</body>
</html>
