services:
  postgres:
    image: postgres:16-alpine
    container_name: admin-child-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: admin_child
      POSTGRES_USER: admin_child
      POSTGRES_PASSWORD: admin_child
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_child -d admin_child"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
