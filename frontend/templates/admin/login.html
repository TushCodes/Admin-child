<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gram SCS Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('admin.static', filename='css/admin.css') }}" />
  <style>
    body.admin-login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .login-shell {
      width: min(100%, 420px);
      border: 1px solid var(--admin-border);
      border-radius: 16px;
      background: #fff;
      box-shadow: var(--admin-shadow);
      overflow: hidden;
    }

    .login-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--admin-border);
      background: var(--admin-panel-soft);
    }

    .login-brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .login-brand-mark {
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border: 1px solid var(--admin-border);
      border-radius: 10px;
      background: #fff;
    }

    .login-brand-mark img {
      display: block;
      max-width: 34px;
      max-height: 34px;
    }

    .login-brand-title {
      display: block;
      color: var(--admin-dark);
      font-size: 1.05rem;
      font-weight: 850;
    }

    .login-brand-subtitle {
      display: block;
      margin-top: 0.2rem;
      color: var(--admin-muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .login-header h1 {
      margin: 0;
      color: var(--admin-dark);
      font-size: clamp(2rem, 8vw, 2.75rem);
      font-weight: 850;
      line-height: 1.05;
    }

    .login-header p {
      margin: 0.65rem 0 0;
      color: var(--admin-muted);
      line-height: 1.7;
    }

    .login-panel {
      padding: 1.5rem;
    }

    .login-alert {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      margin-bottom: 1rem;
      border: 1px solid rgba(220, 53, 69, 0.24);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      color: var(--admin-danger);
      background: rgba(220, 53, 69, 0.08);
      font-weight: 700;
    }

    .login-field { margin-bottom: 1rem; }

    .login-field label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--admin-dark);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .login-field input {
      width: 100%;
      min-height: 52px;
      padding: 0.85rem 0.95rem;
      font: inherit;
    }

    .login-btn {
      width: 100%;
      min-height: 54px;
      margin-top: 0.5rem;
      border: 0;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      background: var(--admin-accent);
      font: inherit;
      font-weight: 850;
    }

    .login-btn:hover,
    .login-btn:focus {
      background: var(--admin-accent-dark);
      outline: none;
    }
  </style>
</head>

<body class="admin-surface admin-login-page">
  <main class="login-shell" aria-label="Admin login">
    <section class="login-header">
      <div class="login-brand">
        <span class="login-brand-mark"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="Gram SCS"></span>
        <span>
          <span class="login-brand-title">Gram SCS</span>
          <span class="login-brand-subtitle">Admin</span>
        </span>
      </div>
      <h1>Admin Login</h1>
      <p>Sign in to manage shipments and leads.</p>
    </section>

    <section class="login-panel" aria-label="Admin login form">
      {% if error %}
      <div class="login-alert" role="alert">
        <span aria-hidden="true">✕</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" action="{{ url_for('admin.login_submit') }}" novalidate>
        <div class="login-field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" placeholder="admin" required autofocus />
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>

        <button class="login-btn" type="submit">Sign in</button>
      </form>
    </section>
  </main>
</body>

</html>
