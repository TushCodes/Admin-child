{% extends 'admin/model/list.html' %}

{% block model_menu_bar_after_filters %}
  {{ super() }}
  <li class="nav-item">
    <a class="nav-link" href="{{ get_url('.export_xlsx') }}">Export XLSX</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="{{ get_url('.export_pdf') }}">Export PDF</a>
  </li>
  <li class="nav-item">
    <form class="import-xlsx-form" method="post" action="{{ get_url('.import_xlsx') }}" enctype="multipart/form-data">
      <input type="file" name="file" accept=".xlsx" required aria-label="Choose XLSX import file">
      <button type="submit" class="btn btn-sm btn-primary">Import XLSX</button>
    </form>
  </li>
{% endblock %}
